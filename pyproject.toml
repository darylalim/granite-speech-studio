[project]
name = "granite-speech-pipeline"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "accelerate>=1.12.0",
    "peft>=0.18.1",
    "streamlit",
    "torch",
    "torchaudio",
    "torchcodec>=0.10.0",
    "transformers",
]

[dependency-groups]
dev = [
    "pytest",
    "ty",
    "ruff",
]

[tool.pytest.ini_options]
pythonpath = ["."]

[tool.ruff.lint.isort]
combine-as-imports = true

[tool.ty.environment]
python-version = "3.12"
